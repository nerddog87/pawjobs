<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>user panel</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Unbounded', sans-serif;
      background: #050505;
      color: #e0e0e0;
      overflow-x: hidden;
    }

    .bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      background:
        repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(255,255,255,0.06) 50px, rgba(255,255,255,0.06) 52px),
        repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(255,255,255,0.04) 50px, rgba(255,255,255,0.04) 52px),
        #050505;
      z-index: -1;
    }

    .container {
      max-width: 1700px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 720px;
      gap: 3rem;
    }

    @media (max-width: 1300px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      background: linear-gradient(90deg, #1e3a5f, #5c8ab5, #1e3a5f);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 0%; }
    }

    .panel-section {
      background: rgba(15,15,15,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid;
      border-image: linear-gradient(135deg, #1e3a5f, #5c8ab5, #1e3a5f) 1;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .panel-section h2 {
      font-size: 0.9rem;
      font-weight: 500;
      color: #e0e0e0;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .panel-section h2 svg {
      width: 18px;
      height: 18px;
      fill: #5c8ab5;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      color: #888;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input[type="text"],
    .form-group input[type="url"],
    .form-group input[type="color"] {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #e0e0e0;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.8rem;
      transition: border-color 0.15s, background 0.15s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #5c8ab5;
      background: rgba(255,255,255,0.08);
    }

    .form-group input[type="color"] {
      height: 45px;
      padding: 0.3rem;
      cursor: pointer;
    }

    .gradient-preview {
      width: 100%;
      height: 80px;
      border-radius: 6px;
      margin-top: 0.5rem;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .color-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .avatar-upload {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .avatar-preview {
      width: 80px;
      height: 80px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid;
      border-image: linear-gradient(135deg, #1e3a5f, #5c8ab5, #1e3a5f) 1;
    }

    .avatar-preview.empty {
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.7rem;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
    }

    .file-input-wrapper input[type="file"] {
      position: absolute;
      left: -9999px;
    }

    .btn {
      padding: 0.7rem 1.2rem;
      background: linear-gradient(135deg, #1e3a5f, #5c8ab5);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn-danger {
      background: rgba(220, 53, 69, 0.8);
    }

    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.65rem;
    }

    .social-links-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .social-link-item {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 0.5rem;
      align-items: center;
      padding: 0.7rem;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .social-link-item input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      color: #e0e0e0;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.7rem;
    }

    .social-link-item input:focus {
      outline: none;
      border-color: #5c8ab5;
    }

    .add-social-btn {
      width: 100%;
      margin-top: 0.5rem;
    }

    .preview-section {
      position: sticky;
      top: 2rem;
      height: fit-content;
    }

    .preview-frame {
      width: 100%;
      height: 680px;
      border: none;
      border-radius: 12px;
      background: #0f0f0f;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .preview-header h2 {
      font-size: 1rem;
      font-weight: 600;
      background: linear-gradient(90deg, #fff, #5c8ab5);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .save-section {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.75rem;
      z-index: 100;
      padding: 0.75rem 1rem;
      background: rgba(15,15,15,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    .save-btn {
      padding: 0.75rem 1.5rem;
      font-size: 0.85rem;
      box-shadow: 0 4px 16px rgba(30, 58, 95, 0.4);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(15,15,15,0.95);
      border: 1px solid rgba(92, 138, 181, 0.5);
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-size: 0.8rem;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .checkbox-group {
      margin-bottom: 0.8rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      cursor: pointer;
      font-size: 0.75rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .checkbox-label input {
      display: none;
    }

    .checkmark {
      width: 18px;
      height: 18px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .checkmark::after {
      content: '';
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) scale(0);
      transition: transform 0.15s;
      margin-bottom: 2px;
    }

    .checkbox-label input:checked + .checkmark {
      background: linear-gradient(135deg, #1e3a5f, #5c8ab5);
      border-color: transparent;
    }

    .checkbox-label input:checked + .checkmark::after {
      transform: rotate(45deg) scale(1);
    }

    .music-section .form-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .music-section .form-group.full-width {
      grid-template-columns: 1fr;
    }

    .icon-select {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .icon-option {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .icon-option:hover {
      background: rgba(255,255,255,0.1);
    }

    .icon-option.selected {
      border-color: #5c8ab5;
      background: rgba(92, 138, 181, 0.2);
    }

    .icon-option svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .icon-search {
      margin-bottom: 0.5rem;
    }

    .icon-search input {
      width: 100%;
      padding: 0.5rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      color: #e0e0e0;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.7rem;
    }

    .help-text {
      font-size: 0.65rem;
      color: #666;
      margin-top: 0.3rem;
    }

    .drag-handle {
      cursor: grab;
      color: #555;
      padding: 0.3rem;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .social-link-item.dragging {
      opacity: 0.5;
    }

    .preset-gradients {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .preset-gradient {
      height: 40px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }

    .preset-gradient:hover {
      transform: scale(1.05);
    }

    .preset-gradient.active {
      border-color: #5c8ab5;
    }
  </style>
</head>
<body>
  <div class="bg-video"></div>

  <div class="container">
    <div class="settings-column">
      <h1>user panel</h1>

      <!-- Profile Section -->
      <div class="panel-section">
        <h2>
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Profile
        </h2>

        <div class="form-group">
          <label>Avatar</label>
          <div class="avatar-upload">
            <img class="avatar-preview" id="avatarPreview" src="" alt="Avatar preview" style="display: none;">
            <div class="avatar-preview empty" id="avatarEmpty">No avatar</div>
            <div class="file-input-wrapper">
              <input type="file" id="avatarInput" accept="image/*">
              <button class="btn btn-sm" onclick="document.getElementById('avatarInput').click()">Choose File</button>
            </div>
            <button class="btn btn-secondary btn-sm" id="removeAvatar" style="display: none;">Remove</button>
          </div>
        </div>

        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="displayName" placeholder="Your name" value="">
        </div>

        <div class="form-group">
          <label>Handle / Username</label>
          <input type="text" id="handle" placeholder="@username" value="">
        </div>

        <div class="form-group">
          <label>Page URL Path</label>
          <input type="text" id="pagePath" placeholder="your-name" value="">
          <p class="help-text">Your page will be at pawjobs.me/<span id="pathPreview">your-name</span></p>
        </div>
      </div>

      <!-- Gradient Colors Section -->
      <div class="panel-section">
        <h2>
          <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
          Theme Colors
        </h2>

        <label style="font-size: 0.7rem; color: #888; margin-bottom: 0.5rem; display: block;">Presets</label>
        <div class="preset-gradients" id="presetGradients">
          <div class="preset-gradient active" data-c1="#1e3a5f" data-c2="#5c8ab5" style="background: linear-gradient(135deg, #1e3a5f, #5c8ab5);"></div>
          <div class="preset-gradient" data-c1="#5c2583" data-c2="#4389a2" style="background: linear-gradient(135deg, #5c2583, #4389a2);"></div>
          <div class="preset-gradient" data-c1="#cb2d3e" data-c2="#ef473a" style="background: linear-gradient(135deg, #cb2d3e, #ef473a);"></div>
          <div class="preset-gradient" data-c1="#56ab2f" data-c2="#a8e063" style="background: linear-gradient(135deg, #56ab2f, #a8e063);"></div>
          <div class="preset-gradient" data-c1="#f857a6" data-c2="#ff5858" style="background: linear-gradient(135deg, #f857a6, #ff5858);"></div>
          <div class="preset-gradient" data-c1="#2b5876" data-c2="#4e4376" style="background: linear-gradient(135deg, #2b5876, #4e4376);"></div>
          <div class="preset-gradient" data-c1="#ff6b6b" data-c2="#feca57" style="background: linear-gradient(135deg, #ff6b6b, #feca57);"></div>
          <div class="preset-gradient" data-c1="#1a1a2e" data-c2="#16213e" style="background: linear-gradient(135deg, #1a1a2e, #16213e);"></div>
        </div>

        <div class="color-row">
          <div class="form-group">
            <label>Primary Color</label>
            <input type="color" id="primaryColor" value="#1e3a5f">
          </div>
          <div class="form-group">
            <label>Secondary Color</label>
            <input type="color" id="secondaryColor" value="#5c8ab5">
          </div>
        </div>
      </div>

      <!-- Social Links Section -->
      <div class="panel-section">
        <h2>
          <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
          Social Links
        </h2>
        <div class="social-links-list" id="socialLinksList">
          <!-- Social links will be added here dynamically -->
        </div>
        <button class="btn btn-secondary btn-sm add-social-btn" id="addSocialBtn">+ Add Social Link</button>
      </div>

      <!-- Music Section -->
      <div class="panel-section music-section">
        <h2>
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
          Music
        </h2>
        <div class="form-group">
          <div>
            <label>Song Title</label>
            <input type="text" id="songTitle" placeholder="Song Name - Artist">
          </div>
          <div>
            <label>Spotify URL</label>
            <input type="url" id="spotifyUrl" placeholder="https://open.spotify.com/track/...">
          </div>
        </div>
        <div class="form-group full-width">
          <label>Audio File</label>
          <div class="avatar-upload">
            <div class="file-input-wrapper">
              <input type="file" id="audioInput" accept="audio/*">
              <button class="btn btn-sm" onclick="document.getElementById('audioInput').click()">Choose Audio File</button>
            </div>
            <span id="audioFileName" style="font-size: 0.7rem; color: #888;">No file selected</span>
            <button class="btn btn-secondary btn-sm" id="removeAudio" style="display: none;">Remove</button>
          </div>
          <p class="help-text">Upload an MP3 file or similar audio format (max 10MB)</p>
        </div>
      </div>

      <!-- Settings Section -->
      <div class="panel-section">
        <h2>
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
          Settings
        </h2>
        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="showDiscordPresence" checked>
            <span class="checkmark"></span>
            Show Discord Presence
          </label>
        </div>
        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="showMusicPlayer" checked>
            <span class="checkmark"></span>
            Show Music Player
          </label>
        </div>
      </div>
    </div>

    <div class="preview-column">
      <div class="preview-section panel-section">
        <div class="preview-header">
          <h2>Preview</h2>
          <button class="btn btn-sm" id="refreshPreview">Refresh</button>
        </div>
        <iframe class="preview-frame" id="previewFrame" src="about:blank"></iframe>
      </div>
    </div>
  </div>

  <div class="save-section">
    <button class="btn btn-secondary" id="resetBtn">Reset</button>
    <button class="btn save-btn" id="saveBtn">Save Changes</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Social icons

    // State management
    let userData = {
      avatar: null,
      displayName: '',
      handle: '',
      primaryColor: '#1e3a5f',
      secondaryColor: '#5c8ab5',
      socialLinks: [],
      songTitle: '',
      spotifyUrl: '',
      audioFile: null,
      showDiscordPresence: true,
      showMusicPlayer: true,
      pagePath: ''
    };

    // Load data from localStorage
    function loadData() {
      const saved = localStorage.getItem('pawjobsUserData');
      if (saved) {
        userData = JSON.parse(saved);
        populateForm();
      }
      updatePreview();
    }

    // Populate form with data
    function populateForm() {
      document.getElementById('displayName').value = userData.displayName || '';
      document.getElementById('handle').value = userData.handle || '';
      document.getElementById('primaryColor').value = userData.primaryColor || '#1e3a5f';
      document.getElementById('secondaryColor').value = userData.secondaryColor || '#5c8ab5';
      document.getElementById('songTitle').value = userData.songTitle || '';
      document.getElementById('spotifyUrl').value = userData.spotifyUrl || '';
      document.getElementById('pagePath').value = userData.pagePath || '';
      document.getElementById('showDiscordPresence').checked = userData.showDiscordPresence !== false;
      document.getElementById('showMusicPlayer').checked = userData.showMusicPlayer !== false;

      // Avatar
      if (userData.avatar) {
        document.getElementById('avatarPreview').src = userData.avatar;
        document.getElementById('avatarPreview').style.display = 'block';
        document.getElementById('avatarEmpty').style.display = 'none';
        document.getElementById('removeAvatar').style.display = 'inline-block';
      }

      // Audio
      if (userData.audioFile) {
        document.getElementById('audioFileName').textContent = 'Audio file saved';
        document.getElementById('removeAudio').style.display = 'inline-block';
      }

      // Social links
      renderSocialLinks();
      updateGradientPreview();
    }

    // Update gradient preview
    function updateGradientPreview() {
      const c1 = document.getElementById('primaryColor').value;
      const c2 = document.getElementById('secondaryColor').value;
      document.getElementById('gradientPreview').style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    }

    // Render social links
    function renderSocialLinks() {
      const container = document.getElementById('socialLinksList');
      container.innerHTML = '';

      userData.socialLinks.forEach((link, index) => {
        const item = document.createElement('div');
        item.className = 'social-link-item';
        item.draggable = true;
        item.dataset.index = index;
        item.innerHTML = `
          <span class="drag-handle">⋮⋮</span>
          <input type="text" placeholder="Platform" value="${link.platform}" class="platform-input" data-index="${index}">
          <input type="url" placeholder="https://..." value="${link.url}" class="url-input" data-index="${index}">
          <button class="btn btn-danger btn-sm" onclick="removeSocialLink(${index})">×</button>
        `;

        // Drag events
        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('drop', handleDrop);
        item.addEventListener('dragend', handleDragEnd);

        container.appendChild(item);
      });
    }

    // Drag and drop handlers
    let dragSrcEl = null;

    function handleDragStart(e) {
      dragSrcEl = this;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
      if (e.preventDefault) e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      return false;
    }

    function handleDrop(e) {
      if (e.stopPropagation) e.stopPropagation();
      if (dragSrcEl !== this) {
        const fromIndex = parseInt(dragSrcEl.dataset.index);
        const toIndex = parseInt(this.dataset.index);
        const item = userData.socialLinks.splice(fromIndex, 1)[0];
        userData.socialLinks.splice(toIndex, 0, item);
        renderSocialLinks();
        updatePreview();
      }
      return false;
    }

    function handleDragEnd() {
      this.classList.remove('dragging');
    }

    // Add social link
    document.getElementById('addSocialBtn').addEventListener('click', () => {
      userData.socialLinks.push({ platform: '', url: '' });
      renderSocialLinks();
    });

    // Remove social link
    function removeSocialLink(index) {
      userData.socialLinks.splice(index, 1);
      renderSocialLinks();
      updatePreview();
    }

    // Avatar upload
    document.getElementById('avatarInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          userData.avatar = event.target.result;
          document.getElementById('avatarPreview').src = event.target.result;
          document.getElementById('avatarPreview').style.display = 'block';
          document.getElementById('avatarEmpty').style.display = 'none';
          document.getElementById('removeAvatar').style.display = 'inline-block';
          updatePreview();
        };
        reader.readAsDataURL(file);
      }
    });

    // Remove avatar
    document.getElementById('removeAvatar').addEventListener('click', () => {
      userData.avatar = null;
      document.getElementById('avatarPreview').style.display = 'none';
      document.getElementById('avatarEmpty').style.display = 'flex';
      document.getElementById('removeAvatar').style.display = 'none';
      document.getElementById('avatarInput').value = '';
      updatePreview();
    });

    // Audio upload
    document.getElementById('audioInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        if (file.size > 10 * 1024 * 1024) {
          showToast('Audio file must be under 10MB');
          return;
        }
        const reader = new FileReader();
        reader.onload = (event) => {
          userData.audioFile = event.target.result;
          document.getElementById('audioFileName').textContent = file.name;
          document.getElementById('removeAudio').style.display = 'inline-block';
          updatePreview();
        };
        reader.readAsDataURL(file);
      }
    });

    // Remove audio
    document.getElementById('removeAudio').addEventListener('click', () => {
      userData.audioFile = null;
      document.getElementById('audioFileName').textContent = 'No file selected';
      document.getElementById('removeAudio').style.display = 'none';
      document.getElementById('audioInput').value = '';
      updatePreview();
    });

    // Color inputs
    document.getElementById('primaryColor').addEventListener('input', (e) => {
      userData.primaryColor = e.target.value;
      updateGradientPreview();
      updatePreview();
    });

    document.getElementById('secondaryColor').addEventListener('input', (e) => {
      userData.secondaryColor = e.target.value;
      updateGradientPreview();
      updatePreview();
    });

    // Preset gradients
    document.querySelectorAll('.preset-gradient').forEach(preset => {
      preset.addEventListener('click', () => {
        document.querySelectorAll('.preset-gradient').forEach(p => p.classList.remove('active'));
        preset.classList.add('active');
        document.getElementById('primaryColor').value = preset.dataset.c1;
        document.getElementById('secondaryColor').value = preset.dataset.c2;
        userData.primaryColor = preset.dataset.c1;
        userData.secondaryColor = preset.dataset.c2;
        updateGradientPreview();
        updatePreview();
      });
    });

    // Text inputs
    document.getElementById('displayName').addEventListener('input', (e) => {
      userData.displayName = e.target.value;
      updatePreview();
    });

    document.getElementById('handle').addEventListener('input', (e) => {
      userData.handle = e.target.value;
      updatePreview();
    });

    document.getElementById('songTitle').addEventListener('input', (e) => {
      userData.songTitle = e.target.value;
      updatePreview();
    });

    document.getElementById('spotifyUrl').addEventListener('input', (e) => {
      userData.spotifyUrl = e.target.value;
      updatePreview();
    });

    document.getElementById('pagePath').addEventListener('input', (e) => {
      userData.pagePath = e.target.value;
      document.getElementById('pathPreview').textContent = e.target.value || 'your-name';
    });

    // Toggles
    document.getElementById('showDiscordPresence').addEventListener('change', (e) => {
      userData.showDiscordPresence = e.target.checked;
      updatePreview();
    });

    document.getElementById('showMusicPlayer').addEventListener('change', (e) => {
      userData.showMusicPlayer = e.target.checked;
      updatePreview();
    });

    // Social links input handlers
    document.getElementById('socialLinksList').addEventListener('input', (e) => {
      if (e.target.classList.contains('platform-input')) {
        const index = parseInt(e.target.dataset.index);
        userData.socialLinks[index].platform = e.target.value;
      } else if (e.target.classList.contains('url-input')) {
        const index = parseInt(e.target.dataset.index);
        userData.socialLinks[index].url = e.target.value;
      }
      updatePreview();
    });

    // Save button
    document.getElementById('saveBtn').addEventListener('click', () => {
      localStorage.setItem('pawjobsUserData', JSON.stringify(userData));
      showToast('Changes saved successfully!');
    });

    // Reset button
    document.getElementById('resetBtn').addEventListener('click', () => {
      if (confirm('Reset all settings to default?')) {
        userData = {
          avatar: null,
          displayName: '',
          handle: '',
          primaryColor: '#1e3a5f',
          secondaryColor: '#5c8ab5',
          socialLinks: [],
          songTitle: '',
          spotifyUrl: '',
          audioFile: null,
          showDiscordPresence: true,
          showMusicPlayer: true,
          pagePath: ''
        };
        populateForm();
        localStorage.removeItem('pawjobsUserData');
        showToast('Settings reset to default');
      }
    });

    // Refresh preview
    document.getElementById('refreshPreview').addEventListener('click', updatePreview);

    // Show toast notification
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Generate preview HTML
    function generatePreviewHTML() {
      const c1 = userData.primaryColor;
      const c2 = userData.secondaryColor;

      const socialLinksHTML = userData.socialLinks
        .filter(link => link.platform && link.url)

          const iconKey = Object.keys(socialIcons).find(k => k.toLowerCase() === link.platform.toLowerCase()) || 'website';
