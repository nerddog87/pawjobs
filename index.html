<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>apollo</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Unbounded', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 5vw;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.48);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 0;
    }

    /* ── CLICK TO ENTER SCREEN ── */
    .enter-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      cursor: pointer;
      transition: opacity 0.6s ease;
    }

    .enter-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .enter-ripple {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      position: relative;
      animation: pulse 2s ease-in-out infinite;
    }

    .enter-ripple::before {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      animation: pulse 2s ease-in-out infinite 0.3s;
    }

    .enter-ripple::after {
      content: '';
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.07);
      animation: pulse 2s ease-in-out infinite 0.6s;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.7; }
    }

    .enter-icon {
      width: 28px;
      height: 28px;
      fill: #fff;
      opacity: 0.9;
    }

    .enter-label {
      font-size: 0.6rem;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    /* ── LAYOUT WRAPPER ── */
    .layout {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: min(525px, 90vw);
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── PROFILE CARD ── */
    .card {
      width: 100%;
      background: rgba(15,15,15,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 1.6rem 2.2rem 1.5rem;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 1.4rem;
      margin-bottom: 1.3rem;
    }

    .avatar {
      width: 100px; height: 100px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
    }

    .info { display: flex; flex-direction: column; gap: 0.25rem; }

    .name {
      font-weight: 600;
      font-size: 1.6rem;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .handle {
      font-weight: 300;
      font-size: 0.65rem;
      color: #4a4a4a;
      letter-spacing: 0.06em;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 1.2rem;
    }

    .socials { display: flex; gap: 1.2rem; align-items: center; }

    .social-link {
      color: #555;
      text-decoration: none;
      display: flex;
      transition: color 0.15s;
    }
    .social-link:hover { color: #fff; }
    .social-link svg { width: 24px; height: 24px; fill: currentColor; }

    /* ── PLAYER CARD ── */
    .player-card {
      width: 100%;
      background: rgba(15,15,15,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 1.1rem 2.2rem 1.2rem;
      animation: fadeIn 0.5s 0.1s ease both;
    }

    .player-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .player-meta { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }

    .player-song {
      font-size: 0.75rem;
      font-weight: 500;
      color: #e0e0e0;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-artist {
      font-size: 0.6rem;
      font-weight: 300;
      color: #555;
      letter-spacing: 0.04em;
    }

    .spotify-link {
      display: inline-flex;
      align-items: center;
      color: #1db954;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .spotify-link:hover { opacity: 1; }
    .spotify-link svg { width: 13px; height: 13px; }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: 0.75rem;
    }

    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: #777; padding: 0;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.12s, transform 0.1s; line-height: 1;
    }
    .ctrl-btn:hover { color: #fff; }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn svg { fill: currentColor; }
    .ctrl-btn.play { color: #fff; }
    .ctrl-btn.play svg { width: 22px; height: 22px; }
    .ctrl-btn.skip svg { width: 15px; height: 15px; }
    .ctrl-btn.vol svg  { width: 14px; height: 14px; }

    .player-progress { display: flex; align-items: center; gap: 0.5rem; }

    .time-label {
      font-size: 0.48rem; font-weight: 300;
      color: #555; letter-spacing: 0.05em; min-width: 2.2rem;
    }
    .time-label.right { text-align: right; }

    .scrubber {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px; position: relative;
      cursor: pointer; transition: height 0.15s;
    }
    .scrubber:hover { height: 4px; }

    .scrubber-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: #fff; border-radius: 99px; width: 0%;
      pointer-events: none;
    }

    .scrubber-thumb {
      position: absolute; top: 50%;
      transform: translate(-50%, -50%);
      width: 9px; height: 9px; border-radius: 50%;
      background: #fff; left: 0%; pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
    }
    .scrubber:hover .scrubber-thumb { opacity: 1; }

    .vol-slider {
      width: 48px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px; cursor: pointer; position: relative;
    }
    .vol-fill {
      height: 100%; background: rgba(255,255,255,0.45);
      border-radius: 99px; width: 65%; pointer-events: none;
    }
  </style>
</head>

  <script>
    const audio         = document.getElementById('audio');
    const enterScreen   = document.getElementById('enterScreen');
    const playBtn       = document.getElementById('playBtn');
    const iconPlay      = document.getElementById('iconPlay');
    const iconPause     = document.getElementById('iconPause');
    const muteBtn       = document.getElementById('muteBtn');
    const iconVol       = document.getElementById('iconVol');
    const iconMute      = document.getElementById('iconMute');
    const skipBackBtn   = document.getElementById('skipBackBtn');
    const skipFwdBtn    = document.getElementById('skipFwdBtn');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl    = document.getElementById('duration');
    const scrubber      = document.getElementById('scrubber');
    const scrubberFill  = document.getElementById('scrubberFill');
    const scrubberThumb = document.getElementById('scrubberThumb');
    const volSlider     = document.getElementById('volSlider');
    const volFill       = document.getElementById('volFill');

    let isScrubbing = false;

    function fmt(s) {
      if (isNaN(s)) return '00:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
    }

    function setPlaying(playing) {
      iconPlay.style.display  = playing ? 'none' : '';
      iconPause.style.display = playing ? ''     : 'none';
    }

    function setMuted(muted) {
      iconVol.style.display  = muted ? 'none' : '';
      iconMute.style.display = muted ? ''     : 'none';
      audio.muted = muted;
    }

    function setVolume(pct) {
      pct = Math.max(0, Math.min(1, pct));
      audio.volume = pct;
      volFill.style.width = (pct * 100) + '%';
      setMuted(pct === 0);
    }

    function scrubTo(clientX) {
      const rect = scrubber.getBoundingClientRect();
      const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      if (audio.duration) audio.currentTime = pct * audio.duration;
    }

    setVolume(0.25);

    // click to enter — dismisses overlay and starts audio
    enterScreen.addEventListener('click', () => {
      enterScreen.classList.add('hidden');
      audio.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
    });

    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = fmt(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      if (isScrubbing) return;
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      scrubberFill.style.width = pct + '%';
      scrubberThumb.style.left = pct + '%';
      currentTimeEl.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('play',  () => setPlaying(true));
    audio.addEventListener('pause', () => setPlaying(false));

    playBtn.addEventListener('click', () => {
      audio.paused ? audio.play() : audio.pause();
    });

    muteBtn.addEventListener('click', () => setMuted(!audio.muted));
    skipBackBtn.addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });
    skipFwdBtn.addEventListener('click',  () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); });

    scrubber.addEventListener('mousedown', (e) => { isScrubbing = true; scrubTo(e.clientX); });
    document.addEventListener('mousemove', (e) => { if (isScrubbing) scrubTo(e.clientX); });
    document.addEventListener('mouseup',   (e) => { if (isScrubbing) { isScrubbing = false; scrubTo(e.clientX); } });

    scrubber.addEventListener('touchstart', (e) => { isScrubbing = true; scrubTo(e.touches[0].clientX); }, { passive: true });
    document.addEventListener('touchmove',  (e) => { if (isScrubbing) scrubTo(e.touches[0].clientX); }, { passive: true });
    document.addEventListener('touchend',   ()  => { isScrubbing = false; });

    let isDraggingVol = false;
    volSlider.addEventListener('mousedown', (e) => {
      isDraggingVol = true;
      const rect = volSlider.getBoundingClientRect();
      setVolume((e.clientX - rect.left) / rect.width);
    });
    document.addEventListener('mousemove', (e) => {
      if (!isDraggingVol) return;
      const rect = volSlider.getBoundingClientRect();
      setVolume((e.clientX - rect.left) / rect.width);
    });
    document.addEventListener('mouseup', () => { isDraggingVol = false; });
  </script>
