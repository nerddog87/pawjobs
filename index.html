<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pawjobs.me</title>
  <meta property="og:title" content="pawjobs.me" />
  <meta property="og:description" content="ryry is a qt" />
  <meta property="og:image" content="https://pawjobs.me/favicon.svg" />
  <meta property="og:url" content="https://pawjobs.me/" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    const _base = 'pawjobs.me';
    const _glitchChars = '!<>-_\\/[]{}—=+*^?#@$%&~';

    function glitchText(target, duration, callback) {
      let start = null;
      const len = target.length;
      function step(ts) {
        if (!start) start = ts;
        const progress = Math.min((ts - start) / duration, 1);
        const revealedCount = Math.floor(progress * len);
        let result = '';
        for (let i = 0; i < len; i++) {
          if (i < revealedCount) {
            result += target[i];
          } else {
            result += _glitchChars[Math.floor(Math.random() * _glitchChars.length)];
          }
        }
        document.title = result;
        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          document.title = target;
          if (callback) callback();
        }
      }
      requestAnimationFrame(step);
    }

    function startGlitchCycle() {
      glitchText(_base, 600, () => {
        setTimeout(() => {
          glitchText(_base, 600, () => {
            setTimeout(startGlitchCycle, 4000);
          });
        }, 1200);
      });
    }

    window.addEventListener('load', () => {
      setTimeout(startGlitchCycle, 1000);
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Unbounded', sans-serif;
      overflow: hidden;
      background: #050505;
      color: #e0e0e0;
    }

    .bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      background: 
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px),
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px),
        #050505;
      z-index: -2;
    }

    .bg-overlay {
      position: fixed; inset: 0;
      background: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      z-index: -1;
    }

    .color-vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(255, 179, 217, 0.05) 0%, rgba(255, 212, 168, 0.03) 50%, transparent 100%);
      z-index: -1;
      pointer-events: none;
      animation: vignettePulse 8s ease-in-out infinite;
    }

    @keyframes vignettePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.6) 100%);
      z-index: -1;
      pointer-events: none;
    }

    .layout {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      opacity: 0;
      transform: translateY(-50px);
      animation: slideDown 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes slideDown {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-wrap {
      animation: logoBob 4s ease-in-out infinite;
      will-change: transform;
      backface-visibility: hidden;
    }

    @keyframes logoBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .logo {
      font-size: 4rem;
      font-weight: 600;
      background: linear-gradient(90deg, #ffb3d9 0%, #ffd4a8 50%, #ffb3d9 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease-in-out infinite;
      letter-spacing: -0.02em;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(0, -8px, 0); }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 0%; }
      100% { background-position: 0% 0%; }
    }

    .subtitle {
      font-size: 0.8rem;
      font-weight: 300;
      color: #777;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      animation: subtitleFade 4s ease-in-out infinite;
    }

    @keyframes subtitleFade {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .profiles {
      display: flex;
      gap: 1.25rem;
      margin-top: 1rem;
      opacity: 0;
      animation: fadeIn 0.6s 0.8s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .profile-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: rgba(15,15,15,0.85);
      border: 1px solid;
      border-image: linear-gradient(135deg, #ffb3d9, #ffd4a8, #ffb3d9) 1;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .profile-link:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(255, 179, 217, 0.2);
    }

    .profile-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
    }

    .profile-name {
      font-size: 1rem;
      font-weight: 500;
      color: #e0e0e0;
    }

    .profile-handle {
      font-size: 0.69rem;
      font-weight: 300;
      color: #777;
    }

    .cursor-dot {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
    }

    .cursor-dot svg {
      width: 22px;
      height: 22px;
      filter: drop-shadow(0 0 8px rgba(255, 179, 217, 0.8));
      transition: transform 0.15s ease;
    }

    .cursor-dot.clicking svg {
      transform: scale(0.7) rotate(45deg);
    }

    .cursor-spark {
      position: fixed;
      pointer-events: none;
      z-index: 9997;
      transform: translate(-50%, -50%);
      animation: sparkFade 0.6s ease-out forwards;
    }

    .cursor-spark::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ffb3d9, #ffd4a8);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    @keyframes sparkFade {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      30% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, 180%) scale(0.3) rotate(180deg); }
    }

    @media (pointer: coarse) {
      * { cursor: auto !important; }
      .cursor-dot { display: none !important; }
      .cursor-spark { display: none !important; }
    }

    .particles-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255, 179, 217, 0.3);
      border-radius: 50%;
      animation: particleFloat 20s infinite ease-in-out;
    }

    @keyframes particleFloat {
      0% { 
        transform: translateY(110vh) translateX(0) rotate(0deg); 
        opacity: 0;
      }
      5% { opacity: 0.4; }
      85% { opacity: 0.4; }
      100% { 
        transform: translateY(-50vh) translateX(30px) rotate(360deg); 
        opacity: 0;
      }
    }

    * { cursor: none !important; }

    @media (max-width: 640px) {
      .logo {
        font-size: 2.5rem;
      }
      .profiles {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="cursor-dot" id="cursorDot">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cursorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ffb3d9;stop-opacity:1" />
          <stop offset="50%" style="stop-color:#ffd4a8;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#ffb3d9;stop-opacity:1" />
        </linearGradient>
      </defs>
      <path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z" fill="url(#cursorGradient)"/>
    </svg>
  </div>

  <div class="bg-video"></div>
  <div class="bg-overlay"></div>
  <div class="color-vignette"></div>
  <div class="vignette"></div>
  <div class="particles-container" id="particles"></div>

  <div class="layout" id="mainLayout">
    <div class="hero">
      <div class="logo-wrap">
        <div class="logo">pawjobs.me</div>
      </div>
      <div class="subtitle">by @apollo</div>
    </div>

    <div class="profiles">
      <a href="https://pawjobs.me/artemis" class="profile-link">
        <img class="profile-avatar" src="artemis/avatar.gif" alt="artemis" />
        <div class="profile-info">
          <div class="profile-name">artemis</div>
          <div class="profile-handle">@prettytarded</div>
        </div>
      </a>
      <a href="https://pawjobs.me/apollo" class="profile-link">
        <img class="profile-avatar" src="apollo/avatar.jpg" alt="apollo" />
        <div class="profile-info">
          <div class="profile-name">apollo</div>
          <div class="profile-handle">@endfawr</div>
        </div>
      </a>
      <a href="https://pawjobs.me/strawberry" class="profile-link">
        <img class="profile-avatar" src="strawberry/avatar.jpg" alt="strawberry" />
        <div class="profile-info">
          <div class="profile-name">strawberry</div>
          <div class="profile-handle">@justuno</div>
        </div>
      </a>
      <a href="https://pawjobs.me/edenware" class="profile-link">
        <img class="profile-avatar" src="edenware/avatar.jpg" alt="edenware" />
        <div class="profile-info">
          <div class="profile-name">edenware</div>
          <div class="profile-handle">@edenware</div>
        </div>
      </a>
    </div>
  </div>

  <script>
    const cursorDot = document.getElementById('cursorDot');
    let mouseX = 0, mouseY = 0;
    let angle = 0;

    let lastSpark = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursorDot.style.left = mouseX + 'px';
      cursorDot.style.top = mouseY + 'px';

      const now = Date.now();
      if (now - lastSpark < 35) return;
      lastSpark = now;
      const spark = document.createElement('div');
      spark.className = 'cursor-spark';
      const size = 6 + Math.random() * 6;
      spark.style.left = mouseX + 'px';
      spark.style.top  = mouseY + 'px';
      spark.style.width = size + 'px';
      spark.style.height = size + 'px';
      spark.style.animationDelay = (Math.random() * 0.1) + 's';
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 700);
    });

    function rotateCursor() {
      angle += 0.5;
      cursorDot.querySelector('svg').style.transform = `rotate(${angle}deg)`;
      requestAnimationFrame(rotateCursor);
    }
    requestAnimationFrame(rotateCursor);

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursorDot.querySelector('svg').style.transform = `scale(1.4) rotate(${angle}deg)`);
    });

    document.addEventListener('mousedown', () => cursorDot.classList.add('clicking'));
    document.addEventListener('mouseup', () => cursorDot.classList.remove('clicking'));

    // Floating particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const duration = 15 + Math.random() * 10;
      const delay = -Math.random() * duration; // negative delay to start mid-animation
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = '110vh'; // start below viewport
      particle.style.animationDelay = delay + 's';
      particle.style.animationDuration = duration + 's';
      particlesContainer.appendChild(particle);
    }
  </script>
</body>
</html>
