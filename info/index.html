<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>apollo / info</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #ccc;
      font-family: 'Unbounded', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── ENTER SCREEN ── */
    .enter-screen {
      position: fixed; inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: opacity 0.7s ease;
    }

    .enter-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .enter-emoji {
      font-size: 2.2rem;
      margin-bottom: 1rem;
      animation: bob 2.5s ease-in-out infinite;
    }

    .enter-label {
      font-size: 0.55rem;
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      background: rgba(15,15,15,0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 2rem 2.2rem;
      animation: fadeIn 0.5s ease both;
      margin: 1rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      font-size: 0.52rem;
      font-weight: 300;
      color: #444;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 1.4rem;
    }

    .message {
      font-size: 0.72rem;
      font-weight: 300;
      line-height: 2;
      color: #bbb;
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.8rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .sign {
      font-size: 0.55rem;
      font-weight: 300;
      color: #444;
      letter-spacing: 0.1em;
    }

    .back-link {
      font-size: 0.52rem;
      font-weight: 300;
      color: #444;
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }
    .back-link:hover { color: #fff; }

    /* ── MUTE BUTTON ── */
    .mute-btn {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      z-index: 10;
      background: rgba(15,15,15,0.85);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      color: #555;
      cursor: pointer;
      padding: 0.55rem 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      transition: color 0.15s, border-color 0.15s;
    }
    .mute-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
    .mute-btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
  </style>
</head>
<body>

  <audio id="audio" src="info-song.mp3" loop preload="auto"></audio>

  <!-- enter screen -->
  <div class="enter-screen" id="enterScreen">
    <div class="enter-label">click anywhere</div>
  </div>

  <!-- main card -->
  <div class="card">
    <div class="tag">info</div>
    <hr class="divider" />

    <p class="message">
      Hello for all who care, I'm not dead or anything (hopefully) I'm just away at the moment dealing with some family issues and whatnot. Do not expect me back any time soon, much love to all who came to read and yes i know i need to fix my ssl certificate.
    </p>

    <div class="footer-row">
      <span class="sign">— apollo</span>
    </div>
  </div>

  <!-- mute button -->
  <button class="mute-btn" id="muteBtn">
    <svg id="iconVol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <svg id="iconMute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
    <span id="muteLabel">mute</span>
  </button>

  <script>
    const audio       = document.getElementById('audio');
    const enterScreen = document.getElementById('enterScreen');
    const muteBtn     = document.getElementById('muteBtn');
    const iconVol     = document.getElementById('iconVol');
    const iconMute    = document.getElementById('iconMute');
    const muteLabel   = document.getElementById('muteLabel');

    audio.volume = 0.5;

    enterScreen.addEventListener('click', () => {
      enterScreen.classList.add('hidden');
      audio.play().catch(() => {});
    });

    muteBtn.addEventListener('click', () => {
      audio.muted = !audio.muted;
      iconVol.style.display  = audio.muted ? 'none' : '';
      iconMute.style.display = audio.muted ? '' : 'none';
      muteLabel.textContent  = audio.muted ? 'unmute' : 'mute';
    });
  </script>

</body>
</html>
